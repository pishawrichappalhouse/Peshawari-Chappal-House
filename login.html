<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Peshawari Chappal House</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7554219557678246"
        crossorigin="anonymous"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" style="background:#fff;">
        <a href="index.html" class="logo">Peshawari<span>Chappal</span> House</a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Login</button>
            </form>
            <div class="auth-links">
                <p>New to our store? <a href="signup.html">Create an Account</a></p>
                <br>
                <a href="admin.html" style="font-size:0.9rem; color:var(--text-light)">Admin Login</a>
            </div>
            
            <!-- Auth Page Ad -->
            <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7554219557678246"
                     data-ad-slot="1765895508"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const users = JSON.parse(safeStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                safeStorage.removeItem('adminSession');
                safeStorage.setItem('currentUser', JSON.stringify(user));
                // Extract redirect query param
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'index.html';
                window.location.href = redirect;
            } else {
                alert('Invalid email or password');
            }
        });
    </script>
</body>
</html>
