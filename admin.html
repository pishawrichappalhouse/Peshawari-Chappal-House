<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Peshawari Chappal House</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7554219557678246"
        crossorigin="anonymous"></script>
</head>

<body style="background: var(--secondary);">
    <div class="auth-container" style="background: transparent;">
        <div class="auth-card">
            <h2 class="auth-title" style="color:var(--primary)">Admin Portal</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="admin-user" required placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-pass" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Access
                    Dashboard</button>
            </form>
            <div class="auth-links">
                <a href="index.html" style="color:var(--text-light)">&larr; Back to Main Site</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if (safeStorage.getItem('adminSession') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('admin-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;

            // Strictly 1 admin login
            if (user === 'admin' && pass === 'admin123') {
                safeStorage.removeItem('currentUser');
                safeStorage.setItem('adminSession', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid Admin Credentials!');
            }
        });
    </script>
</body>

</html>
