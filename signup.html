<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Peshawari Chappal House</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7554219557678246"
        crossorigin="anonymous"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" style="background:#fff;">
        <a href="index.html" class="logo">Peshawari<span>Chappal</span> House</a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Create Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="johndoe123">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Must be at least 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm" required placeholder="Re-enter password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Signup</button>
            </form>
            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
            
            <!-- Auth Page Ad -->
            <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7554219557678246"
                     data-ad-slot="1765895508"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            const users = JSON.parse(safeStorage.getItem('users')) || [];
            if (users.find(u => u.email === email)) {
                alert('Email already registered.');
                return;
            }
            
            const newUser = { name, username, email, password, role: 'user' };
            users.push(newUser);
            safeStorage.setItem('users', JSON.stringify(users));
            
            alert('Registration Successful! Please login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
